<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Pro - Álgebra 2º ESO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .math-card {
            background: #0f172a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .category-node {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-node:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
        }

        .correct-flash { animation: flashGreen 0.6s ease-out; }
        .wrong-flash { animation: flashRed 0.6s ease-out; }

        @keyframes flashGreen {
            0% { background-color: transparent; }
            50% { background-color: rgba(34, 197, 94, 0.2); }
            100% { background-color: transparent; }
        }

        @keyframes flashRed {
            0% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.2); }
            100% { background-color: transparent; }
        }

        .xp-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            font-size: 0.9em;
            margin: 0 0.1em;
        }
        .fraction span { padding: 0 0.1em; }
        .fraction .num { border-bottom: 2px solid currentColor; }

        sup { font-size: 0.6em; }
        .math-text { font-family: 'Times New Roman', serif; font-style: italic; }
    </style>
</head>
<body class="min-h-screen transition-colors duration-300" id="main-body">

    <header class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="app.nav('home')">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="infinity" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-black tracking-tight">Estudio <span class="text-indigo-600">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Puntos Totales</p>
                    <p id="total-score" class="text-lg font-black text-indigo-600">0.0</p>
                </div>
                <button onclick="app.resetProgress()" class="p-2 bg-slate-100 rounded-full hover:bg-rose-100 transition-colors" title="Reiniciar Todo">
                    <i data-lucide="rotate-ccw" class="w-5 h-5 text-slate-600"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8" id="view-container">
        <!-- Vistas dinámicas -->
    </main>

    <div id="diploma-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="max-w-2xl w-full p-12 text-center rounded-sm shadow-2xl bg-[#fffbeb] border-[15px] border-double border-amber-600">
            <i data-lucide="award" class="w-20 h-20 text-amber-600 mx-auto mb-6"></i>
            <h2 class="text-amber-800 font-serif text-5xl italic mb-4">Certificado Máster</h2>
            <div class="h-1 w-20 bg-amber-600 mx-auto mb-8"></div>
            <p class="text-slate-500 font-bold uppercase tracking-widest mb-2">¡EXCELENCIA EN ÁLGEBRA!</p>
            <h3 class="text-3xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Maestro/a de 2º ESO</h3>
            <p class="text-lg text-slate-600 mb-10 italic">"Has superado satisfactoriamente los retos de expresiones algebraicas de este nivel."</p>
            <button onclick="app.closeDiploma()" class="bg-amber-700 text-white px-10 py-4 rounded-full font-bold hover:bg-amber-800 shadow-xl">Continuar</button>
        </div>
    </div>

                    </button>
                    <h2 class="text-3xl font-black mb-10 tracking-tight">${cat.name}</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${cat.children.map(s => `
                            <div onclick="app.handleSubClick('${s.key}', ${s.levels})" class="category-node glass p-8 rounded-3xl cursor-pointer flex justify-between items-center group">
                                <span class="text-xl font-bold text-slate-700">${s.name}</span>
                                <i data-lucide="chevron-right" class="text-slate-300 group-hover:text-indigo-600"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            },

            renderDiff(container, key) {
                container.innerHTML = `
                    <button onclick="app.nav('subs', '${this.findParentCat(key)}')" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-indigo-600 transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i> Volver
                    </button>
                    <h2 class="text-3xl font-black mb-10 text-center uppercase tracking-tighter">Selecciona Nivel</h2>
                    <div class="flex flex-col sm:flex-row gap-6 justify-center max-w-2xl mx-auto">
                        <button onclick="app.nav('quiz', '${key}_basic')" class="flex-1 p-10 rounded-[3rem] bg-emerald-50 border-2 border-emerald-100 text-emerald-800 font-black text-2xl hover:bg-emerald-100 shadow-sm transition-all">Básico</button>
                        <button onclick="app.nav('quiz', '${key}_expert')" class="flex-1 p-10 rounded-[3rem] bg-indigo-50 border-2 border-indigo-100 text-indigo-800 font-black text-2xl hover:bg-indigo-100 shadow-sm transition-all">Experto</button>
                    </div>
                `;
            },

            renderQuiz(container, key) {
                this.currentSubKey = key;
                container.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black uppercase text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full w-fit mb-2">RETO ACTIVO</span>
                            <div class="flex items-center gap-3">
                                <div class="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                                    <div id="game-progress" class="h-full bg-indigo-600 xp-bar" style="width: ${(this.points[key] || 0)*10}%"></div>
                                </div>
                                <span id="game-pts" class="text-sm font-black text-slate-700">${(this.points[key] || 0).toFixed(0)}/10</span>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="app.loadNextExercise(true)" class="flex-1 sm:flex-none px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-amber-100 hover:text-amber-700 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="skip-forward" class="w-4 h-4"></i> Saltar
                            </button>
                            <button onclick="app.goBackFromQuiz()" class="flex-1 sm:flex-none px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-indigo-100 hover:text-indigo-700 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="layers" class="w-4 h-4"></i> Niveles
                            </button>
                            <button onclick="app.nav('home')" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-rose-100 hover:text-rose-700 transition-colors flex items-center justify-center">
                                <i data-lucide="home" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl border border-slate-100" id="arena">
                        <div class="math-card rounded-[2.5rem] p-12 mb-10 text-center relative overflow-hidden shadow-inner">
                            <div id="math-q" class="text-2xl md:text-4xl text-white font-bold math-text">Cargando...</div>
                        </div>
                        <p id="math-p" class="text-lg md:text-xl font-bold text-slate-500 mb-10 text-center"></p>
                        <div id="options-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>

                        <div id="feedback-panel" class="hidden mt-8 p-8 rounded-[2rem] border-2">
                            <h4 id="fb-status" class="text-2xl font-black mb-2 italic">Explicación</h4>
                            <p id="fb-text" class="text-lg leading-relaxed"></p>
                            <button onclick="app.loadNextExercise()" class="mt-8 w-full py-4 rounded-2xl bg-white border-2 font-black shadow-sm hover:bg-slate-50">SIGUIENTE</button>
                        </div>
                    </div>
                `;
                setTimeout(() => this.loadNextExercise(), 50);
            },

            findParentCat(subKey) {
                const baseKey = subKey.replace('_basic', '').replace('_expert', '');
                for(let cat of CATEGORIES) {
                    if(cat.key === baseKey) return cat.id;
                    if(cat.children && cat.children.some(c => c.key === baseKey)) return cat.id;
                }
                return 'home';
            },

            goBackFromQuiz() {
                const baseKey = this.currentSubKey.replace('_basic', '').replace('_expert', '');
                const cat = CATEGORIES.find(c => c.children && c.children.some(ch => ch.key === baseKey));
                if(cat && cat.children.find(ch => ch.key === baseKey).levels) {
                    this.nav('diff', baseKey);
                } else {
                    this.nav('subs', this.findParentCat(this.currentSubKey));
                }
            },

            handleCatClick(id) {
                const cat = CATEGORIES.find(x => x.id === id);
                if (cat.sub) this.nav('subs', id);
                else this.nav('quiz', cat.key);
            },

            handleSubClick(key, hasLevels) {
                if(hasLevels) this.nav('diff', key);
                else this.nav('quiz', key);
            },

            loadNextExercise(isSkip = false) {
                const key = this.currentSubKey;
                const pool = DATABASE[key];
                if(!pool) return;
                
                let available = pool.map((_, i) => i).filter(i => !(this.usedIndices[key] || []).includes(i));
                
                if (isSkip && available.length > 1) {
                    available = available.filter(i => i !== this.currentIdx);
                }

                if (available.length === 0) {
                    this.usedIndices[key] = [];
                    available = pool.map((_, i) => i);
                }

                const randIdx = available[Math.floor(Math.random() * available.length)];
                this.activeEx = pool[randIdx];
                this.currentIdx = randIdx;

                const qEl = document.getElementById('math-q');
                const pEl = document.getElementById('math-p');
                const grid = document.getElementById('options-grid');
                const fb = document.getElementById('feedback-panel');

                if (!qEl || !this.activeEx) return;

                qEl.innerHTML = this.activeEx.q;
                pEl.innerText = this.activeEx.p || "¿Cuál es la respuesta correcta?";
                fb.classList.add('hidden');
                if(document.getElementById('main-body')) document.getElementById('main-body').classList.remove('correct-flash', 'wrong-flash');

                grid.innerHTML = '';
                const correct = this.activeEx.a.toString().trim();
                const distractors = [...(this.activeEx.o || [])].map(d => d.toString().trim());
                const finalOptions = [correct, ...distractors].sort(() => Math.random() - 0.5);
                
                finalOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "p-6 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-600 text-left font-bold text-slate-700 transition-all shadow-sm flex items-center justify-start gap-2 group";
                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-xs text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                            <i data-lucide="circle" class="w-3 h-3"></i>
                        </div>
                        <span class="math-text">${opt}</span>
                    `;
                    btn.onclick = () => this.checkAnswer(opt, btn);
                    grid.appendChild(btn);
                });
                if(window.lucide) lucide.createIcons();
            },

            checkAnswer(val, btn) {
                const isCorrect = val.toString().trim() === this.activeEx.a.toString().trim();
                const fb = document.getElementById('feedback-panel');
                document.querySelectorAll('#options-grid button').forEach(b => b.disabled = true);

                if (isCorrect) {
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                    if(document.getElementById('main-body')) document.getElementById('main-body').classList.add('correct-flash');
                    
                    if(!this.usedIndices[this.currentSubKey]) this.usedIndices[this.currentSubKey] = [];
                    if(!this.usedIndices[this.currentSubKey].includes(this.currentIdx)) {
                        this.usedIndices[this.currentSubKey].push(this.currentIdx);
                    }
                    
                    this.points[this.currentSubKey] = Math.min(10, (this.points[this.currentSubKey] || 0) + 1);
                    this.save();

                    setTimeout(() => {
                        if (this.checkMastery()) document.getElementById('diploma-modal').classList.remove('hidden');
                        this.loadNextExercise();
                        this.refreshQuizUI();
                        this.updateGlobalScore();
                    }, 800);
                } else {
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                    if(document.getElementById('main-body')) document.getElementById('main-body').classList.add('wrong-flash');
                    if(fb) {
                        fb.classList.remove('hidden');
                        fb.className = "mt-8 p-8 rounded-[2rem] border-2 border-rose-200 bg-rose-50 text-rose-800 animate-view";
                    }
                    const tx = document.getElementById('fb-text');
                    if(tx) tx.innerHTML = `<div><strong>Respuesta:</strong> ${this.activeEx.a}</div><div class="text-sm opacity-70 mt-2">${this.activeEx.f || ""}</div>`;
                }
            },

            save() {
                localStorage.setItem('ep_pts_v18', JSON.stringify(this.points));
                localStorage.setItem('ep_used_v18', JSON.stringify(this.usedIndices));
            },

            resetProgress() {
                if(confirm("¿Seguro que quieres borrar todo el progreso?")) {
                    localStorage.clear();
                    location.reload();
                }
            },

            refreshQuizUI() {
                const bar = document.getElementById('game-progress');
                const pts = document.getElementById('game-pts');
                if (bar) bar.style.width = `${(this.points[this.currentSubKey] || 0) * 10}%`;
                if (pts) pts.innerText = `${(this.points[this.currentSubKey] || 0).toFixed(0)}/10`;
            },

            updateGlobalScore() {
                const total = Object.values(this.points).reduce((a, b) => a + b, 0);
                const scoreDisplay = document.getElementById('total-score');
                if(scoreDisplay) scoreDisplay.innerText = total.toFixed(0);
            },

            checkMastery() {
                return ALL_SUBS.every(id => (this.points[id] || 0) >= 10);
            },

            closeDiploma() {
                const dm = document.getElementById('diploma-modal');
                if(dm) dm.classList.add('hidden');
                this.nav('home');
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
